apiVersion: apps/v1
kind: Deployment
metadata:
  name: gap-frontend
  namespace: gap-portal
  labels:
    app: gap-frontend
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gap-frontend
  template:
    metadata:
      labels:
        app: gap-frontend
    spec:
      containers:
        - name: gap-frontend
          image: gap-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gap-frontend
  namespace: gap-portal
  labels:
    app: gap-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: gap-frontend
