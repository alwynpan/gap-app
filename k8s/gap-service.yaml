apiVersion: v1
kind: Service
metadata:
  name: gap-service
  namespace: gap-portal
  labels:
    app: gap-portal
spec:
  type: ClusterIP
  ports:
    - name: frontend
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: backend
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: gap-frontend
