name: Bug Report
description: Report a bug or unexpected behaviour in the Group Assignment Portal
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below so we can investigate and fix the issue as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reliably reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages or screenshots if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: The version shown in the bottom-right footer of the app (e.g. `v1.2.3 · abc1234`).
      placeholder: "e.g. v1.2.3 · abc1234"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using when the issue occurred?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help — logs, screenshots, account role (Admin / Assignment Manager / User), etc.
