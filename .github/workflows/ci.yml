name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend lint
        working-directory: ./backend
        run: npm run lint

      - name: Upload backend lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-eslint-report
          path: backend/eslint.xml
          retention-days: 7

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint

      - name: Upload frontend lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-eslint-report
          path: frontend/eslint.xml
          retention-days: 7

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/cobertura-coverage.xml
          retention-days: 7

      - name: Check backend coverage report exists
        working-directory: ./backend
        run: |
          if [ ! -f coverage/cobertura-coverage.xml ]; then
            echo "Coverage report not found"
            exit 1
          fi
          echo "Coverage report generated successfully"

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          retention-days: 7

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend format check
        working-directory: ./backend
        run: npm run format:check

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend format check
        working-directory: ./frontend
        run: npm run format:check

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, format]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend build
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend build
        working-directory: ./frontend
        run: npm run build
