name: CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  # Use Node.js 24 runtime for all GitHub-hosted actions (checkout, setup-node, etc.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend lint
        working-directory: ./backend
        run: npm run lint

      - name: Upload backend lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-eslint-report
          path: backend/eslint.xml
          retention-days: 7

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint

      - name: Upload frontend lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-eslint-report
          path: frontend/eslint.xml
          retention-days: 7

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend format check
        working-directory: ./backend
        run: npm run format:check

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend format check
        working-directory: ./frontend
        run: npm run format:check

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/cobertura-coverage.xml
          retention-days: 7

      - name: Check backend coverage report exists
        working-directory: ./backend
        run: |
          if [ ! -f coverage/cobertura-coverage.xml ]; then
            echo "Coverage report not found"
            exit 1
          fi
          echo "Coverage report generated successfully"

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

      - name: Verify frontend coverage report exists
        working-directory: ./frontend
        run: test -f coverage/cobertura-coverage.xml || (echo "Frontend coverage report not found!" && exit 1)

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          retention-days: 7

  test-integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run integration tests with coverage
        working-directory: ./backend
        run: npm run test:integration:coverage:quiet

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: backend/coverage-integration/cobertura-coverage.xml
          retention-days: 7

  # Build Docker images for every run; push only on pushes to main or version tags.
  # Renamed to 'docker' so the fan-in 'build' job below can serve as the single
  # required status check without being split by the matrix into multiple check names.
  docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-integration, format]
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gap-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
            type=ref,event=branch

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Fan-in job: succeeds only when both docker matrix variants pass.
  # Named 'build' to match the required status check configured in branch protection.
  build:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: All Docker builds passed
        run: echo "Backend and frontend Docker builds succeeded."
